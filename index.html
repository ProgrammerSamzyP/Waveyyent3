<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Wavey.ent | The New Wave</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />

    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js">
    </script>
    <script src="https://js.paystack.co/v1/inline.js">
    </script>
    <script src="https://checkout.flutterwave.com/v3.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #050505;
            overflow-x: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
        }

        h1,
        h2,
        h3,
        .font-display {
            font-family: 'Clash Display', sans-serif;
        }

        .glass-nav {
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .text-glow {
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.25);
        }

        .card-3d {
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card-3d:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px -20px rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: none;
            transition: all 0.3s ease;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #e5e5e5;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-outline:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .section-padding {
            padding: 4rem 1rem;
        }

        @media (min-width: 768px) {
            .section-padding {
                padding: 6rem 2rem;
            }
        }

        @media (min-width: 1024px) {
            .section-padding {
                padding: 8rem 2rem;
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes successPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes subtleShake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(-0.8px, 0.8px);
            }
            50% {
                transform: translate(0.6px, -0.4px);
            }
            75% {
                transform: translate(-0.4px, -0.6px);
            }
        }

        @keyframes heroSlideFade {
            0% {
                opacity: 0;
                transform: scale(1.08);
            }
            8% {
                opacity: 1;
                transform: scale(1);
            }
            28% {
                opacity: 1;
                transform: scale(1);
            }
            36% {
                opacity: 0;
                transform: scale(1.04);
            }
            100% {
                opacity: 0;
                transform: scale(1.04);
            }
        }

        @keyframes brandEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px);
                letter-spacing: 12px;
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: normal;
            }
        }

        @keyframes brandExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-40px) scale(0.7);
                filter: blur(8px);
            }
        }

        @keyframes ctaEntrance {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }
            60% {
                opacity: 1;
                transform: translateY(-8px) scale(1.04);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hero-slide {
            animation: heroSlideFade 20s infinite;
        }
        .hero-slide:nth-child(1) {
            animation-delay: 0s;
        }
        .hero-slide:nth-child(2) {
            animation-delay: 5s;
        }
        .hero-slide:nth-child(3) {
            animation-delay: 10s;
        }
        .hero-slide:nth-child(4) {
            animation-delay: 15s;
        }

        .brand-entrance {
            animation: brandEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .brand-exit {
            animation: brandExit 0.9s cubic-bezier(0.55, 0, 1, 0.45) forwards;
        }
        .cta-entrance {
            animation: ctaEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .shop-shaky {
            animation: subtleShake 4s infinite;
        }
        .product-shaky {
            animation: subtleShake 3s infinite;
        }

        #toast {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 85vw;
            width: auto;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (min-width: 768px) {
            #toast {
                bottom: 30px;
                right: 30px;
                left: auto;
                transform: translateX(0) translateY(150%);
            }
            #toast.show {
                transform: translateX(0) translateY(0);
            }
        }

        .mobile-nav-item.active {
            color: #ffffff !important;
        }

        .mobile-nav-item.active i {
            color: #ffffff !important;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -10px;
            background: #ffffff;
            color: #000000;
            font-size: 0.65rem;
            font-weight: 800;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0 2px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 1023px) {
            .cart-badge {
                top: 0px;
                right: -6px;
                min-width: 16px;
                height: 16px;
                font-size: 0.6rem;
            }
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        @media (min-width: 640px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.25rem;
            }
        }

        @media (min-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }

        .product-card {
            cursor: pointer;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: transparent;
            border: none;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.5s ease;
            border-radius: 12px;
        }

        .product-card .hover-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0);
            transition: background 0.4s ease;
            border-radius: 12px;
            pointer-events: none;
        }

        .product-card:hover .hover-hint {
            background: rgba(0, 0, 0, 0.35);
        }

        .product-card .hover-hint span {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s ease;
            font-family: 'Clash Display', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .product-card:hover .hover-hint span {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card .aspect-portrait {
            aspect-ratio: 3/4;
            width: 100%;
        }

        @media (max-width: 1023px) {
            #desktop-nav {
                display: none !important;
            }
            #mobile-top-bar {
                display: flex !important;
            }
            main {
                padding-top: 60px !important;
                padding-bottom: 80px !important;
            }
        }

        @media (min-width: 1024px) {
            #desktop-nav {
                display: flex !important;
            }
            #mobile-top-bar {
                display: none !important;
            }
            #mobile-bottom-nav {
                display: none !important;
            }
            main {
                padding-top: 80px !important;
                padding-bottom: 0 !important;
            }
        }

        .cart-item-delete {
            cursor: pointer;
            transition: all 0.2s;
            color: #aaaaaa;
        }

        .cart-item-delete:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .style-thumb {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            border-radius: 8px;
            overflow: hidden;
            opacity: 0.5;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }

        .style-thumb.active {
            border-color: #ffffff;
            opacity: 1;
        }

        .style-thumb:hover {
            opacity: 0.85;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            user-select: none;
        }

        .quantity-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .quantity-btn:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.92);
        }

        .quantity-display {
            width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            user-select: none;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 0;
        }

        .back-btn:hover {
            color: #fff;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85rem;
            color: #aaa;
        }

        .info-row i {
            width: 20px;
            text-align: center;
            color: #fff;
            font-size: 0.9rem;
        }

        .checkout-step {
            animation: slideIn 0.5s ease;
        }

        .payment-method-card {
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .payment-method-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .payment-method-card.selected {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .payment-method-card .check-icon {
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .payment-method-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .success-animation {
            animation: successPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #mobile-top-bar .brand-text {
            font-size: 1.8rem;
            line-height: 1;
        }

        /* Rain effect */
        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }
        .raindrop {
            position: absolute;
            width: 2px;
            background: rgba(255, 255, 255, 0.25);
            animation: fall linear infinite;
        }
        @keyframes fall {
            from {
                transform: translateY(-100px);
            }
            to {
                transform: translateY(110vh);
            }
        }

        /* Account dropdown */
        .account-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 8px 0;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: 0.2s ease;
            z-index: 60;
        }
        .account-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .account-dropdown button {
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            font-size: 0.9rem;
            color: #ccc;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .account-dropdown button:hover {
            background: #222;
            color: #fff;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Preloader -->
    <div id="preloader" style="position:fixed;inset:0;background:#0a0a0a;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.5s ease,visibility 0.5s ease;">
        <img src="preLogopreview.png" alt="Wavey.ent" style="width:350px;height:350px;object-fit:contain;animation:blink 1s infinite;" onerror="this.style.display='none';this.parentElement.innerHTML='<h1 style=font-family:Clash Display,sans-serif;font-size:3.5rem;color:#fff;animation:blink 1s infinite;>WAVEY.ENT</h1>'">
    </div>

    <!-- DESKTOP NAVIGATION -->
    <nav id="desktop-nav" class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-gray-800 items-center justify-between px-6" style="height:80px;display:none;">
        <div class="flex items-center gap-5">
            <a onclick="appRouter('shop')" class="text-sm text-gray-400 hover:text-white cursor-pointer font-medium uppercase tracking-wider transition-colors">Shop</a>
            <a onclick="appRouter('lookbook')" class="text-sm text-gray-400 hover:text-white cursor-pointer font-medium uppercase tracking-wider transition-colors">Lookbook</a>
            <a onclick="appRouter('contact')" class="text-sm text-gray-400 hover:text-white cursor-pointer font-medium uppercase tracking-wider transition-colors">Contact</a>
        </div>
        <span class="font-display text-4xl font-bold tracking-tighter cursor-pointer absolute left-1/2 -translate-x-1/2" onclick="appRouter('home')">WAVEYY<span>.</span>ENT</span>
        <div class="flex items-center gap-5">
            <button onclick="toggleCart()" class="relative text-gray-400 hover:text-white text-xl transition-colors" aria-label="Cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="desktop-cart-badge" class="cart-badge hidden">0</span>
            </button>
            <div class="relative" id="desktop-account-wrapper">
                <button onclick="toggleAccountMenu()" class="text-gray-400 hover:text-white text-xl transition-colors" id="desktop-account-icon" aria-label="Account">
                    <i class="fa-solid fa-user"></i>
                </button>
                <div class="account-dropdown" id="desktop-account-dropdown">
                    <button onclick="appRouter('orders'); closeAccountMenu();"><i class="fa-solid fa-box mr-2"></i>My Orders</button>
                    <button onclick="logout(); closeAccountMenu();"><i class="fa-solid fa-arrow-right-from-bracket mr-2"></i>Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MOBILE TOP BAR -->
    <div id="mobile-top-bar" class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-gray-700 flex items-center justify-between px-4" style="display:none; height:60px;">
        <div class="w-8"></div>
        <span class="font-display text-2xl font-bold tracking-tighter cursor-pointer" onclick="appRouter('home')">WAVEYY<span>.</span>ENT</span>
        <div class="relative">
            <button onclick="toggleMobileAccountMenu()" class="text-gray-400 hover:text-white text-lg w-8 flex justify-end transition-colors" id="mobile-account-btn" aria-label="Account">
                <i class="fa-solid fa-user"></i>
            </button>
            <div class="account-dropdown right-0" id="mobile-account-dropdown" style="position:absolute; top:100%; right:0;">
                <button onclick="appRouter('orders'); closeMobileAccountMenu();"><i class="fa-solid fa-box mr-2"></i>My Orders</button>
                <button onclick="logout(); closeMobileAccountMenu();"><i class="fa-solid fa-arrow-right-from-bracket mr-2"></i>Logout</button>
            </div>
        </div>
    </div>

    <main id="app"></main>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav id="mobile-bottom-nav" class="fixed bottom-0 left-0 right-0 z-50 glass-nav border-t border-gray-800" style="padding-bottom:env(safe-area-inset-bottom,0px);height:64px;">
        <div class="flex items-center justify-around h-full">
            <button onclick="appRouter('home')" class="mobile-nav-item active flex flex-col items-center justify-center gap-0.5 text-gray-400 font-semibold text-[10px] flex-1 h-full" id="nav-home"><i class="fa-solid fa-house text-base"></i><span>Home</span></button>
            <button onclick="appRouter('shop')" class="mobile-nav-item flex flex-col items-center justify-center gap-0.5 text-gray-400 font-semibold text-[10px] flex-1 h-full" id="nav-shop"><i class="fa-solid fa-shop text-base"></i><span>Shop</span></button>
            <button onclick="appRouter('lookbook')" class="mobile-nav-item flex flex-col items-center justify-center gap-0.5 text-gray-400 font-semibold text-[10px] flex-1 h-full" id="nav-lookbook"><i class="fa-solid fa-images text-base"></i><span>Looks</span></button>
            <button onclick="toggleCart()" class="mobile-nav-item flex flex-col items-center justify-center gap-0.5 text-gray-400 font-semibold text-[10px] flex-1 h-full relative" id="nav-cart">
                <span class="relative inline-block">
                    <i class="fa-solid fa-cart-shopping text-base"></i>
                    <span id="mobile-cart-badge" class="cart-badge hidden">0</span>
                </span>
                <span>Cart</span>
            </button>
        </div>
    </nav>

    <!-- CART DRAWER -->
    <div id="cart-drawer" class="fixed inset-0 z-[70] hidden">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-gray-950 border-l border-gray-800 shadow-2xl flex flex-col transition-transform translate-x-full duration-300" id="cart-panel">
            <div class="p-5 border-b border-gray-800 flex justify-between items-center">
                <h2 class="font-display text-xl">Your Cart</h2>
                <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl hover:text-white"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
            <div class="p-5 border-t border-gray-800 bg-gray-900">
                <div class="flex justify-between text-lg font-bold mb-4"><span>Subtotal</span><span id="cart-total">₦0</span></div>
                <button onclick="openCheckoutModal()" class="w-full btn-primary text-black py-4 rounded-xl font-bold uppercase tracking-wider">Checkout</button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkout-modal" class="fixed inset-0 z-[80] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeCheckoutModal()"></div>
        <div class="bg-gray-950 border border-gray-700 rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto p-6 md:p-8 relative shadow-2xl" id="checkout-container">
            <!-- Close button always visible -->
            <button onclick="closeCheckoutModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl z-10"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="fixed inset-0 z-[80] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeAuthModal()"></div>
        <div class="bg-gray-950 border border-gray-700 rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto p-6 md:p-8 relative shadow-2xl" id="auth-content"></div>
    </div>

    <!-- SUCCESS PAGE -->
    <div id="success-page" class="fixed inset-0 z-[95] hidden flex items-center justify-center p-4" style="background:#050505;overflow-y:auto;">
        <div class="absolute inset-0" id="success-confetti-bg"></div>
        <div class="relative z-10 w-full max-w-lg mx-auto text-center py-8" id="success-page-content"></div>
    </div>

        function updateCartUI() {

            totalEl.innerText = '₦' + subtotal.toLocaleString();

        function updateCartQuantity(index, change) {
            if (index<0||index>=cart.length) return;
            cart[index].quantity = (cart[index].quantity||1) + change;
            if (cart[index].quantity < 1) cart.splice(index,1);
            localStorage.setItem('wavey_cart', JSON.stringify(cart));
            updateCartUI(); renderCartItems();
        }

        function removeCartItem(index) {
            if (index<0||index>=cart.length) return;
            cart.splice(index,1);
            localStorage.setItem('wavey_cart', JSON.stringify(cart));
            updateCartUI(); renderCartItems();
            showToast('Item removed');
        }

        function addToCartWithSize(id) {
            if (!currentUser) return openAuthModal('login');
            if (!selectedSize) return showToast('Please select a size');
            const p = products.find(x => x.id === id);
            if (!p) return;
            const qty = selectedQuantity || 1;
            const idx = cart.findIndex(i => i.id === id && i.size === selectedSize);
            idx !== -1 ? cart[idx].quantity += qty : cart.push({ ...p, quantity: qty, size: selectedSize });
            localStorage.setItem('wavey_cart', JSON.stringify(cart));
            updateCartUI();
            if (!document.getElementById('cart-drawer').classList.contains('hidden')) renderCartItems();
            showToast('Added to cart!');
            selectedQuantity = 1;
            const display = document.getElementById('product-quantity-display');
            if (display) display.textContent = '1';
            updateAddToCartButtonPrice();
        }

            currentStyleIndex = index;

            const mainImg = document.getElementById('main-product-image');
            if (mainImg && allStyles[index]) mainImg.src = allStyles[index];
            document.querySelectorAll('.style-thumb').forEach((el,i) => el.classList.toggle('active', i===index));

        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;

            if (el) el.classList.add('selected');

        function goBackToCheckoutStep1() { checkoutStep = 1; renderCheckoutStep1(); document.getElementById('checkout-container').scrollTop = 0; }

        function processPayment() { const subtotal = cart.reduce((s,i)=>s+((i.price||0)*(i.quantity||1)),0);
        const total = subtotal + (subtotal>=50000?0:5000);
        const ref = 'WVY_'+Date.now();
        if(selectedPaymentMethod==='flutterwave') processFlutterwave(total,ref);
        else processPaystack(total,ref); }
        function processPaystack(total, ref) {showToast('Opening Paystack...');
        try {
            PaystackPop.setup({
                key: 'pk_test_3e2b0630ceccd8cd2f5dae7998ee3638c7f780a3', // Replace with your Paystack public key
                email: checkoutCustomerData.email,
                amount: total * 100,
                currency: 'NGN',
                ref: ref,
                metadata: { custom_fields: [{display_name:"Customer Name",variable_name:"customer_name",value:checkoutCustomerData.name}] },
                callback: r => handlePaymentSuccess(total, ref, r.reference, 'paystack'),
                onClose: () => showToast('Payment cancelled')
            }).openIframe();
        } catch(err) { console.error(err); showToast('Could not open Paystack.'); }}
        function processFlutterwave(total, ref) { showToast('Opening Flutterwave...');
        try {
            FlutterwaveCheckout({
                public_key: 'FLWPUBK_TEST-XXXXXXXXXXXX-X', // Replace with your Flutterwave public key
                tx_ref: ref, amount: total, currency: 'NGN',
                payment_options: 'card, banktransfer, ussd',
                customer: { email:checkoutCustomerData.email, phone_number:checkoutCustomerData.phone, name:checkoutCustomerData.name },
                customizations: { title:'Wavey.ent', description:'Order Payment', logo:'' },
                callback: r => handlePaymentSuccess(total, ref, r.transaction_id, 'flutterwave'),
                onclose: () => showToast('Payment cancelled')
            });
        } catch(err) { console.error(err); showToast('Could not open Flutterwave.'); }}

        function handlePaymentSuccess(total, ref, paymentRef, paymentMethod) {
            const orderItems = cart.map(item => ({ name: item.name, price: item.price, quantity: item.quantity||1, size: item.size, image: item.image }));
            const subtotal = orderItems.reduce((s,i) => s + (i.price*i.quantity), 0);
            const vat = Math.round(subtotal * VAT_RATE);
            const delivery = getDeliveryFee(checkoutCustomerData.country, subtotal, checkoutCustomerData.state);
            const orderData = {
                userId: currentUser ? currentUser.uid : 'guest',
                userEmail: currentUser ? currentUser.email : checkoutCustomerData.email,
                customer: { ...checkoutCustomerData },
                items: orderItems, subtotal, vat, delivery, total, reference: ref, paymentMethod, status: 'pending',
                tracking: [{ status: 'pending', timestamp: new Date().toISOString(), note: 'Order placed' }],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            saveOrderToFirestore(orderData, orderItems, total, ref).finally(() => {
                closeCheckoutModal();
                const dr = document.getElementById('cart-drawer'), pn = document.getElementById('cart-panel');

        async function saveOrderToFirestore(orderData, orderItems, total, ref) {
            try {
                const docRef = await db.collection('orders').add(orderData);
                console.log('✅ Order saved!', docRef.id);
                cart = []; localStorage.setItem('wavey_cart', JSON.stringify(cart)); updateCartUI();
                try { sendOrderEmail(orderData.customer.email, orderData.customer.name, ref, 'pending', orderItems, total, 'Your order is being processed.'); } catch(e){}
                showSuccessPage({ reference: ref, customer: orderData.customer, items: orderItems, total, paymentMethod: orderData.paymentMethod, orderId: docRef.id, error: null });
            } catch (error) {
                console.error('❌ Firestore save failed:', error);
                const errorMsg = error.code === 'permission-denied' ? '⚠️ Order not saved to database. Payment successful. Contact support with ref: ' + ref : '⚠️ Order may not have saved. Contact support with ref: ' + ref;
                showSuccessPage({ reference: ref, customer: orderData.customer, items: orderItems, total, paymentMethod: orderData.paymentMethod, error: errorMsg });
                showToast(errorMsg);
            }
        }

                const drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random()*100+'%';
                drop.style.animationDuration = Math.random()*2+1+'s';
                drop.style.animationDelay = Math.random()*2+'s';

        }

        function appRouter(view, param) {
            if (myOrdersUnsubscribe) { myOrdersUnsubscribe(); myOrdersUnsubscribe = null; }
            if (heroTransitionTimeout) { clearTimeout(heroTransitionTimeout); heroTransitionTimeout = null; }
            const app = document.getElementById('app');
            window.scrollTo(0,0);
            document.querySelectorAll('.mobile-nav-item').forEach(b => { b.classList.remove('active'); b.classList.add('text-gray-400'); });
            if (view === 'home') {
                app.innerHTML = renderHome();
                document.getElementById('nav-home')?.classList.add('active');
                heroTransitionTimeout = setTimeout(() => {
                    const heroBrand = document.getElementById('hero-brand');
                    const heroCta = document.getElementById('hero-cta-wrapper');
                    if (heroBrand) heroBrand.classList.add('brand-exit');
                    if (heroCta) { heroCta.classList.remove('opacity-0','pointer-events-none'); heroCta.classList.add('cta-entrance'); }
                }, 10000);
            } else if (view === 'shop') {
                app.innerHTML = renderShop();
                document.getElementById('nav-shop')?.classList.add('active');
                setTimeout(() => spawnRain('shop-rain-container', 60), 150);
            } else if (view === 'lookbook') {
                app.innerHTML = renderLookbook();
                document.getElementById('nav-lookbook')?.classList.add('active');
            } else if (view === 'about') { app.innerHTML = renderAbout(); } else if (view === 'contact') { app.innerHTML = renderContact(); } else if (view === 'wishlist') { app.innerHTML = renderWishlist(); } else if (view === 'orders') {
                app.innerHTML = `<div class="section-padding max-w-4xl mx-auto"><div class="flex items-center justify-between mb-8"><h2 class="font-display text-3xl font-bold">📦 My Orders</h2><button onclick="logout()" class="btn-outline text-white px-4 py-2 rounded-xl font-bold text-sm"><i class="fa-solid fa-arrow-right-from-bracket mr-2"></i>Logout</button></div><div id="my-orders-list" class="space-y-4"><div class="text-center py-12"><i class="fa-solid fa-spinner fa-spin text-3xl text-gray-500 mb-4"></i><p class="text-gray-400">Loading your orders...</p></div></div><div class="text-center mt-8"><a href="https://wa.me/2349078859896" target="_blank" class="btn-primary text-black px-8 py-4 rounded-full font-bold inline-flex items-center gap-2"><i class="fa-brands fa-whatsapp"></i> Contact Support</a></div></div>`;
                loadMyOrders();
            } else if (view === 'product' && param) { app.innerHTML = renderProductPage(param); }
        }

        function renderHome() {
            const slidesHtml = heroSlides.map((src,i) => `<div class="hero-slide absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image:url('${src}');animation-delay:${i*5}s;" onerror="this.style.background='#0a0a0a';"></div>`).join('');
            return `
        <section class="relative min-h-screen flex items-center justify-center overflow-hidden" id="home-hero">
            <div class="absolute inset-0 bg-black/60 z-[1]"></div>
            <div class="absolute inset-0 z-0">${slidesHtml}</div>
            <div class="rain-container z-[4]" id="home-rain-container"></div>
            <div class="relative z-10 text-center px-4">
                <h1 class="font-display text-5xl sm:text-7xl lg:text-9xl font-black mb-4 text-glow brand-entrance tracking-tight" id="hero-brand">WAVEYY<span>.</span>ENT</h1>
                <div class="mt-6 opacity-0 pointer-events-none transition-all duration-700" id="hero-cta-wrapper">
                    <button onclick="appRouter('shop')" class="btn-primary text-black px-12 py-5 rounded-full font-bold text-xl sm:text-2xl shadow-2xl hover:scale-105 transition-transform">SHOP NOW</button>
                    
                </div>
            </div>
        </section>
        <section class="bg-black text-white border-t border-gray-800 pt-16 pb-32 lg:pb-8 px-4">
            <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 mb-12">
                <div class="col-span-2 md:col-span-1"><h3 class="font-display text-2xl font-bold mb-4">WAVEYY<span>.</span>ENT</h3><p class="text-gray-400 text-sm">Redefining streetwear.</p><div class="flex space-x-4 mt-4"><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-instagram"></i></a><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-tiktok"></i></a></div></div>
                <div><h4 class="font-bold mb-3">Shop</h4><ul class="space-y-2 text-gray-400 text-sm"><li><a onclick="appRouter('shop')" class="hover:text-white cursor-pointer">Products</a></li></ul></div>
                <div><h4 class="font-bold mb-3">Support</h4><ul class="space-y-2 text-gray-400 text-sm"><li><a onclick="appRouter('contact')" class="hover:text-white cursor-pointer">Contact</a></li></ul></div>
                <div><h4 class="font-bold mb-3">Updates</h4><form onsubmit="event.preventDefault();showToast('Subscribed! 🌊')" class="flex"><input type="email" placeholder="Email" class="flex-1 px-4 py-2 bg-black border border-gray-600 rounded-l text-white text-sm"><button class="bg-white text-black px-4 py-2 rounded-r font-bold hover:bg-gray-200">→</button></form></div>
            </div>
            <div class="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm">© 2026 Waveyy.ent</div>
        </section>`;
        }

        function renderShop() {
            return `<div class="section-padding max-w-7xl mx-auto relative"><div class="rain-container" id="shop-rain-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></div><div class="relative z-10"><div class="product-grid">${products.map(p=>`<div class="product-card card-3d shop-shaky" onclick="navigateToProduct(${p.id})"><div class="aspect-portrait"><img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/600x800/1a1a1a/fff?text=?'"></div><div class="hover-hint"><span>View</span></div></div>`).join('')}</div></div></div>`;
        }

        function renderLookbook() {
            return `<div class="section-padding max-w-7xl mx-auto"><h2 class="font-display text-4xl sm:text-5xl font-bold mb-8 text-center">THE <span class="text-white">LOOKBOOK</span></h2><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${lookbook.map(i=>`<div class="rounded-2xl overflow-hidden border border-gray-800"><img src="${i}" class="w-full h-full object-cover aspect-[3/4]" onerror="this.src='https://placehold.co/400x600/1a1a1a/fff?text=Look'"></div>`).join('')}</div></div>`;
        }

        function renderAbout() {
            return `<div class="section-padding max-w-4xl mx-auto text-center"><h2 class="font-display text-4xl font-bold mb-6">OUR <span class="text-white">STORY</span></h2><p class="text-gray-300 text-lg leading-relaxed">Born from the streets, for the streets.</p></div>`;
        }

        function renderContact() {
            return `<div class="section-padding max-w-4xl mx-auto text-center"><h2 class="font-display text-4xl font-bold mb-6">CONTACT</h2><a href="https://wa.me/2349078859896" target="_blank" class="btn-primary text-black px-8 py-4 rounded-full font-bold inline-flex items-center gap-2"><i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp</a></div>`;
        }

        function renderWishlist() {
            const w = products.filter(p => wishlist.includes(p.id));
            return `<div class="section-padding max-w-7xl mx-auto"><h2 class="font-display text-4xl font-bold mb-8">Wishlist</h2>${w.length===0?'<p class="text-gray-500">Your wishlist is empty.</p>':`<div class="product-grid">${w.map(p=>`<div class="product-card card-3d" onclick="navigateToProduct(${p.id})"><div class="aspect-portrait"><img src="${p.image}" onerror="this.src='https://placehold.co/600x800/1a1a1a/fff?text=?'"></div><div class="hover-hint"><span>View</span></div></div>`).join('')}</div>`}</div>`;
        }

        function renderProductPage(id) {
            const p = products.find(x => x.id === id);
            if (!p) return `<div class="section-padding text-center mt-20"><h2>Product not found</h2><button onclick="appRouter('shop')" class="btn-outline mt-4">Back to Wave</button></div>`;
            currentProductId = id; currentStyleIndex = 0; selectedSize = p.sizes.length>0 ? p.sizes[0] : ""; selectedQuantity = 1;
            const allStyles = p.styles && p.styles.length>0 ? p.styles : [p.image];
            const isSoldOut = p.sizes.length === 0;
            setTimeout(() => spawnRain('rain-container', 50), 100);
            return `
        <div class="section-padding max-w-7xl mx-auto relative">
            <div class="rain-container" id="rain-container"></div>
            <div class="mb-6 relative z-10"><button onclick="appRouter('shop')" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Wave</button></div>
            <div class="flex flex-col md:flex-row gap-8 relative z-10">
                <div class="w-full md:w-7/12">
                    <div class="aspect-[3/4] bg-black rounded-2xl overflow-hidden relative">
                        <img src="${allStyles[0]}" alt="${p.name}" class="w-full h-full object-cover product-shaky" id="main-product-image" onerror="this.src='https://placehold.co/600x800/1a1a1a/fff?text=?'">
                        ${allStyles.length>1?`<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 bg-black/50 backdrop-blur-md rounded-full px-3 py-2">${allStyles.map((s,i)=>`<button onclick="selectProductStyle(${i})" class="style-thumb ${i===0?'active':''}"><img src="${s}" class="w-full h-full object-cover"></button>`).join('')}</div>`:''}
                    </div>
                </div>
                <div class="w-full md:w-5/12">
                    <h1 class="font-display text-3xl md:text-4xl font-bold mb-2">${p.name}</h1>
                    <p class="text-white text-3xl font-bold mb-4">₦${p.price.toLocaleString()}</p>
                    <p class="text-gray-400 text-sm mb-6 leading-relaxed">${p.description || 'Essential streetwear piece.'}</p>
                    ${!isSoldOut?`<div class="mb-5"><div class="flex items-center justify-between"><p class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Size</p><button onclick="openSizeGuide()" class="text-xs text-white hover:underline">Size Guide</button></div><div class="flex flex-wrap gap-2">${p.sizes.map(s=>`<button onclick="selectProductSize('${s}',this)" class="sz-btn border px-5 py-3 rounded-full font-bold text-sm transition-all ${s===selectedSize?'bg-white/10 border-white text-white':'border-gray-600 text-white hover:border-white'}">${s}</button>`).join('')}</div></div>
                    <div class="mb-6"><p class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Quantity</p><div class="flex items-center gap-3"><button onclick="changeProductQuantity(-1)" class="quantity-btn">−</button><span class="quantity-display" id="product-quantity-display">1</span><button onclick="changeProductQuantity(1)" class="quantity-btn">+</button></div></div>
                    <button onclick="addToCartWithSize(${p.id})" class="w-full btn-primary text-black py-4 rounded-xl font-bold text-lg mb-6" id="add-to-cart-btn">Add to Cart — ₦${p.price.toLocaleString()}</button>`:`<div class="w-full bg-gray-800 text-gray-400 py-4 rounded-xl font-bold text-lg mb-6 text-center uppercase tracking-wider">Sold Out</div>`}
                    <div class="space-y-0 mt-6">
                        <div class="info-row"><i class="fa-solid fa-truck-fast"></i><span>Ships in 7–10 business days</span></div>
                        <div class="info-row"><i class="fa-solid fa-shield-halved"></i><span>Secure checkout</span></div>
                        <div class="info-row"><i class="fa-solid fa-tag"></i><span>Free shipping over ₦200,000</span></div>
                    </div>
                </div>
            </div>
        </div>`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast'), m = document.getElementById('toast-message');
            m.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500);
        }

        setTimeout(() => spawnRain('home-rain-container', 45), 200);
        updateCartUI();
        appRouter('home');
    </script>
</body>
</html>
